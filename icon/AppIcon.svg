<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- JumpIT brand gradient: orange #f19a3a -> gold #f4bf36 -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f19a3a"/>
      <stop offset="1" stop-color="#f4bf36"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Big Sur style rounded-square body with transparent margins -->
  <g filter="url(#shadow)">
    <rect x="102" y="102" width="820" height="820" rx="184" ry="184" fill="url(#brand)"/>
    <rect x="102" y="102" width="820" height="410" rx="184" ry="184" fill="url(#sheen)"/>
  </g>

  <!-- Motif: a data packet being measured (MTU width) -->
  <g stroke="#ffffff" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- packet block -->
    <rect x="300" y="356" width="424" height="208" rx="40" ry="40"
          fill="#ffffff" fill-opacity="0.16" stroke-width="26"/>
    <!-- packet inner data lines -->
    <line x1="362" y1="430" x2="662" y2="430" stroke-width="22" stroke-opacity="0.85"/>
    <line x1="362" y1="490" x2="590" y2="490" stroke-width="22" stroke-opacity="0.6"/>

    <!-- dimension line measuring the packet width -->
    <line x1="300" y1="660" x2="724" y2="660" stroke-width="26"/>
    <!-- end ticks -->
    <line x1="300" y1="628" x2="300" y2="692" stroke-width="26"/>
    <line x1="724" y1="628" x2="724" y2="692" stroke-width="26"/>
    <!-- left arrowhead -->
    <polyline points="352,632 300,660 352,688" stroke-width="26"/>
    <!-- right arrowhead -->
    <polyline points="672,632 724,660 672,688" stroke-width="26"/>
  </g>

  <!-- JumpIT "jump" chevron accent above the packet -->
  <polyline points="430,316 512,256 594,316" fill="none" stroke="#ffffff"
            stroke-width="30" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.95"/>
</svg>
